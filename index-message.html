<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>המערכת מתעדכנת</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{
background:white;
padding:40px;
border-radius:14px;
box-shadow:0 10px 35px rgba(0,0,0,0.1);
text-align:center;
max-width:500px;
width:100%;
}

.logo{
width:120px;
max-width:40vw;
margin-bottom:20px;
}

h1{
margin:0 0 10px 0;
color:#1e293b;
font-size:28px;
}

p{
color:#64748b;
font-size:18px;
line-height:1.6;
}

.footer{
margin-top:20px;
font-size:14px;
color:#94a3b8;
}

@media (max-width:600px){

.container{
padding:30px 20px;
}

.logo{
width:90px;
}

h1{
font-size:22px;
}

p{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>המערכת מתעדכנת</h1>

<p>
אנחנו מבצעים עדכון קצר למערכת.<br>
נחזור לפעילות בקרוב.
</p>

<div class="footer">
תעשיידע
</div>

</div>

</body>
</html>
